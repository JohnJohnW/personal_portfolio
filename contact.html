    <main class="container mt-5 mb-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
          <div class="card shadow">
            <div class="card-header bg-primary text-white">
              <h4 class="mb-0">Contact</h4>
            </div>
            <div class="card-body">
              <form action="https://formspree.io/f/mnnaakdp" method="POST">
                <div class="mb-3">
                  <label for="name" class="form-label">Name</label>
                  <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
                </div>
                <div class="mb-3 mt-3">
                  <label for="email" class="form-label">Email</label>
                  <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                  <label for="eventDescription" class="form-label">Message</label>
                  <textarea class="form-control" id="eventDescription" name="message" rows="4" placeholder="Enter event description" required></textarea>
                </div>
                <input type="hidden" name="_to" value="johnwynter55893@outlook.com">
                <div class="d-grid">
                  <button type="submit" class="btn btn-success">Send message</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
